<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>music catalog</title>

<style>

body{
    font-family: monospace;
    background:#0f0f0f;
    color:#e0e0e0;
    padding:20px;
}

h4{
	margin-bottom:10px;
}

#songs{
    max-width:500px;
}

.song{
    padding:6px 10px;
    border-bottom:1px solid #333;
}

.song a{
    text-decoration:none;
    color:#8ab4ff;
}

.song a:hover{
    text-decoration:underline;
	color:#2372fc;
}
#search{
background:#27292b;
color:#e0e0e0;
border:1px solid #333;
padding:6px 8px;
font-family:monospace;
}

#search::placeholder{
color:#747575;
}

</style>

</head>
<body>

<h1>my music</h1>
<h4>click on song's name to download</h4>

<div>
<input id="search" placeholder="search..." style="margin-bottom:10px;">
<span id="count"></span>
</div>

<div id="songs"></div>

<script>

const user = "Gibsy";
const repo = "MusicBox";
const folder = "files";

let allSongs=[];

fetch(`https://api.github.com/repos/${user}/${repo}/contents/${folder}`)
.then(r=>r.json())
.then(files=>{

    allSongs = files
        .filter(f=>f.name.endsWith(".mp3"))
        .sort((a,b)=>a.name.localeCompare(b.name));

    render(allSongs);

});

function render(list){

    const container = document.getElementById("songs");
    container.innerHTML="";

    list.forEach(song=>{

        const div = document.createElement("div");
        div.className="song";

        const link = document.createElement("a");
        link.href = song.download_url;
        link.textContent = song.name;
        link.download = song.name;

        div.appendChild(link);
        container.appendChild(div);

    });

    document.getElementById("count").textContent = list.length+" songs total";

}

document.getElementById("search").addEventListener("input",e=>{

    const q = e.target.value.toLowerCase();

    const filtered = allSongs.filter(s =>
        s.name.toLowerCase().includes(q)
    );

    render(filtered);

});

</script>

</body>
</html>
